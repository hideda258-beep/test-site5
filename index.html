<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>勤務時間管理アプリ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body {
      width: 100%;
      overflow-x: hidden;
    }
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      color: #1f2937;
      background: 
        radial-gradient(ellipse at 15% 20%, rgba(224, 242, 254, 0.9) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 80%, rgba(224, 242, 254, 0.9) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(254, 252, 232, 0.9) 0%, transparent 55%),
        radial-gradient(ellipse at 15% 80%, rgba(254, 252, 232, 0.9) 0%, transparent 55%),
        linear-gradient(180deg, #ebf8ef 0%, #d1fae5 40%, #ecfdf5 60%, #cdebd5 100%);
      background-attachment: fixed;
    }
    .card {
      background-color: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      padding: 20px;
    }
    .input-field {
      width: 100%;
      padding: 16px;
      font-size: 1.3rem;
      border: 2px solid #d1d5db;
      border-radius: 8px;
      margin-bottom: 20px;
      background-color: #f9fafb;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 20px;
      font-size: 1.5rem;
      font-weight: bold;
      text-align: center;
      border-radius: 12px;
      cursor: pointer;
      border: none;
    }
    .btn-primary {
      background-color: #2563eb;
      color: white;
      box-shadow: 0 4px 0 #1d4ed8;
    }
    .btn-primary:active {
      transform: translateY(4px);
      box-shadow: none;
    }
    .text-huge {
      font-size: 2.2rem;
      font-weight: bold;
      line-height: 1.2;
    }
    .progress-bg {
      background-color: #e5e7eb;
      height: 40px;
      width: 100%;
      overflow: hidden;
      margin-top: 12px;
    }
    .progress-bar {
      height: 100%;
      transition: width 0.5s ease-in-out;
    }
    .filled {
      background-color: #e6f4ea !important;
    }
    .btn-pressed {
      box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.2) !important;
    }
    @media (max-width: 480px) {
      .time-input {
        width: 90px !important;
        font-size: 1.8rem !important;
      }
    }
  </style>
</head>
<body class="pb-20">

  <!-- ヘッダーエリア -->
  <div class="header-area flex flex-col items-center relative pt-4 mb-4 px-2">
    <h1 class="relative inline-block text-3xl sm:text-4xl font-extrabold tracking-wider">
      <span class="absolute left-0 top-0 w-full h-full text-transparent select-none z-0" style="-webkit-text-stroke: 6px white; filter: drop-shadow(0px 3px 3px rgba(0,0,0,0.15));">勤務時間かんたん管理</span>
      <span class="relative z-10 bg-clip-text text-transparent bg-gradient-to-b from-[#22c55e] to-[#15803d]">勤務時間かんたん管理</span>
    </h1>
    
    <div class="header-user-row w-full flex justify-center items-center mt-4 sm:mt-0">
      <div id="headerUserName" class="bg-[#FFF8CC] text-gray-800 text-xl sm:text-2xl font-bold shadow-sm tracking-widest border-2 border-yellow-200 px-5 py-2 rounded-xl" style="display: none;"></div>
      <button onclick="openSettings()" class="ml-4 bg-white/70 backdrop-blur-sm text-gray-600 border border-gray-300 px-3 py-2 rounded-xl text-sm font-bold shadow-sm hover:bg-white active:scale-95 transition-all flex items-center gap-1">
        <span>⚙️ 設定</span>
      </button>
    </div>
  </div>

  <!-- 月切り替えヘッダー -->
  <header class="bg-blue-800 text-white p-4 flex justify-between items-center shadow-md">
    <button onclick="changeMonth(-1)" class="bg-white text-[#1d4ed8] hover:text-[#1e40af] border border-[#e5e7eb] rounded-lg py-[6px] px-[12px] text-xl font-bold shadow-[0_2px_6px_rgba(0,0,0,0.15)] active:translate-y-[2px] transition-all whitespace-nowrap">◀ 前月</button>
    <div class="flex-1 flex justify-center px-1">
      <h1 id="displayMonth" class="text-2xl sm:text-3xl font-bold text-center py-2 px-6 rounded-sm border-2 border-white bg-blue-900/70 shadow-[inset_0_3px_6px_rgba(0,0,0,0.6)] whitespace-nowrap">----年 --月</h1>
    </div>
    <button onclick="changeMonth(1)" class="bg-white text-[#1d4ed8] hover:text-[#1e40af] border border-[#e5e7eb] rounded-lg py-[6px] px-[12px] text-xl font-bold shadow-[0_2px_6px_rgba(0,0,0,0.15)] active:translate-y-[2px] transition-all whitespace-nowrap">次月 ▶</button>
  </header>

  <div id="messageArea" style="display: none;"></div>

  <div class="max-w-2xl mx-auto p-4">
    <!-- タブ切り替え -->
    <div class="flex mb-4 rounded-2xl overflow-hidden shadow-md border-4 border-blue-600">
      <button id="btnTabInput" onclick="switchTab('input')" class="flex-1 py-5 text-xl sm:text-2xl font-bold bg-blue-600 text-white transition-colors">本日の情報入力</button>
      <button id="btnTabList" onclick="switchTab('list')" class="flex-1 py-5 text-xl sm:text-2xl font-bold bg-white text-gray-500 hover:bg-gray-100 transition-colors">タイムカード</button>
    </div>

    <!-- リアルタイム時計 -->
    <div class="mb-8 bg-white border-2 border-blue-300 rounded-xl py-6 sm:py-8 px-4 shadow-sm flex justify-center items-center flex-wrap gap-x-8 gap-y-3 font-extrabold text-blue-900 tracking-wider bg-gradient-to-b from-blue-50/50 via-white to-blue-50/50">
      <span id="realtimeDate" class="text-[22px] sm:text-[28px]">📆 ----年 -月-日（-）</span>
      <span id="realtimeClock" class="text-[28px] sm:text-[36px]">🕰️ -- : -- : --</span>
    </div>

    <!-- ★ 入力タブ ★ -->
    <div id="tabInput">
      <!-- 📍本日と日付のエリア（画像に合わせた余白調整） -->
      <div class="card mb-8 border-4 border-blue-500 bg-blue-50 text-center py-6 shadow-md">
        <div class="flex justify-center items-center text-2xl sm:text-3xl font-bold text-gray-800 mb-2">
          📍 本日
        </div>
        <div class="flex justify-center items-center gap-2 text-2xl sm:text-3xl font-bold text-gray-800 pt-1 mb-6 tracking-wide">
          <span>📅</span>
          <span id="topDateDisplay">----年 --月--日（-）</span>
        </div>
        
        <!-- 本日の勤務時間詳細カード（画像に基づいた配色と区切り線） -->
        <div class="mb-6 bg-[#fffdf0] border-2 border-amber-400 rounded-2xl py-6 px-4 mx-auto max-w-sm sm:max-w-md shadow-sm">
          <div class="text-lg sm:text-xl font-bold text-gray-700 mb-2">本日の勤務時間<span class="text-sm">（87h対象）</span></div>
          <div id="topWorkTime" class="text-3xl sm:text-4xl font-extrabold text-blue-800 tracking-wider mb-4">--時間 --分</div>
          
          <!-- 横の区切り線 -->
          <div class="border-t-2 border-amber-200 mx-auto w-4/5 mb-4"></div>
          
          <div class="text-md sm:text-lg font-bold text-gray-600 mb-1">残業時間<span class="text-sm">（17:30以降）</span></div>
          <div id="topOverTime" class="text-2xl sm:text-3xl font-bold text-[#b45309] tracking-wider">--時間 --分</div>
        </div>

        <input type="hidden" id="date">

        <!-- 下部の時間表示（PC用○ : ○の調整含む） -->
        <div class="flex justify-center items-center gap-3 sm:gap-8 flex-wrap">
          <div class="flex flex-col items-center">
            <div class="text-lg sm:text-2xl font-bold text-gray-600 mb-0.5">出勤時間</div>
            <div id="displayStartBox" class="text-2xl sm:text-4xl font-bold text-blue-900 bg-white border-4 border-gray-300 py-3 px-4 sm:px-6 rounded-xl shadow-sm min-w-[110px] sm:min-w-[140px] text-center">
              <span id="topStartTime">--:--</span>
            </div>
          </div>
          <div class="flex flex-col items-center">
            <div class="text-lg sm:text-2xl font-bold text-gray-600 mb-0.5">退勤時間</div>
            <div id="displayEndBox" class="text-2xl sm:text-4xl font-bold text-orange-900 bg-white border-4 border-gray-300 py-3 px-4 sm:px-6 rounded-xl shadow-sm min-w-[110px] sm:min-w-[140px] text-center">
              <span id="topEndTime">--:--</span>
            </div>
          </div>
          <div class="flex flex-col items-center">
            <div class="text-lg sm:text-2xl font-bold text-gray-600 mb-0.5">休憩時間</div>
            <div id="displayRestBox" class="text-xl sm:text-2xl font-bold text-yellow-700 bg-white border-4 border-gray-300 py-3 px-4 sm:px-6 rounded-xl shadow-sm min-w-[140px] sm:min-w-[180px] text-center whitespace-nowrap">
              <span id="topRestTime">--分</span>
            </div>
          </div>
        </div>

        <div id="editGuideMessage" class="hidden mt-8">
          <button type="button" onclick="editTodayRecord()" class="bg-red-50 border-4 border-red-400 text-red-600 font-bold text-xl sm:text-2xl py-4 px-8 rounded-xl shadow-[0_6px_0_#ef4444] hover:translate-y-[2px] active:translate-y-[6px] active:shadow-none transition-all w-full max-w-sm mx-auto flex items-center justify-center gap-2">
            <span>✏️</span> 本日の情報を修正
          </button>
        </div>
      </div>

      <!-- 入力エリア -->
      <div id="inputFormArea" class="card border-2 border-blue-200">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 pb-2 border-b-2 border-blue-100 flex items-center">✏️ 勤務時間を登録する</h2>
        <form onsubmit="saveRecord(event)">
          <div class="mb-8 p-6 bg-blue-50 border-4 border-blue-200 rounded-2xl">
            <label class="block text-2xl font-bold text-blue-900 mb-6 border-b-2 border-blue-200 pb-2">🏢 出勤時間</label>
            <div class="flex flex-col sm:flex-row gap-3 sm:gap-6 mb-3">
              <button type="button" id="btnNormal" onclick="setNormalCommute()" class="flex-1 py-5 px-2 rounded-xl text-xl sm:text-2xl font-bold border-4 border-gray-300 bg-white">通常出勤<br><span class="text-lg font-normal">（08:30）</span></button>
              <button type="button" id="btnFlex" onclick="setFlexCommute()" class="flex-1 py-5 px-2 rounded-xl text-xl sm:text-2xl font-bold border-4 border-gray-300 bg-white">時間差出勤</button>
            </div>
            <div class="flex justify-center items-center gap-2 bg-white py-6 px-4 rounded-xl border-2 border-blue-100 shadow-inner">
              <input type="text" inputmode="numeric" id="startHour" class="input-field mb-0 w-24 text-4xl font-bold text-center" placeholder="--">
              <span class="text-4xl font-bold text-gray-500">：</span>
              <input type="text" inputmode="numeric" id="startMinute" class="input-field mb-0 w-24 text-4xl font-bold text-center" placeholder="--">
            </div>
          </div>

          <div class="mb-8 p-6 bg-orange-50 border-4 border-orange-200 rounded-2xl">
            <label class="block text-2xl font-bold text-orange-900 mb-6 border-b-2 border-orange-200 pb-2">🏠 退勤時間</label>
            <button type="button" onclick="setCurrentEndTime()" class="w-full mb-3 py-5 px-4 rounded-xl text-2xl font-bold border-4 border-orange-400 bg-orange-100 text-orange-900 shadow-sm">🕒 今すぐ退勤</button>
            <div class="flex justify-center items-center gap-2 bg-white py-6 px-4 rounded-xl border-2 border-orange-100 shadow-inner">
              <input type="text" inputmode="numeric" id="endHour" class="input-field mb-0 w-24 text-4xl font-bold text-center" placeholder="--">
              <span class="text-4xl font-bold text-gray-500">：</span>
              <input type="text" inputmode="numeric" id="endMinute" class="input-field mb-0 w-24 text-4xl font-bold text-center" placeholder="--">
            </div>
          </div>
          
          <div class="mb-8 p-6 bg-yellow-50 border-4 border-yellow-200 rounded-2xl">
            <label class="block text-2xl font-bold text-yellow-900 mb-6 border-b-2 border-yellow-200 pb-2">☕ 休憩時間</label>
            <div class="mb-6">
              <p class="text-xl font-bold text-yellow-800 mb-4">① 基本休憩</p>
              <div class="flex flex-col sm:flex-row gap-3 sm:gap-6">
                <button type="button" id="btnRestNone" onclick="setNoneRest()" class="flex-1 py-5 px-2 rounded-xl text-xl sm:text-2xl font-bold border-4 border-gray-300 bg-white">なし</button>
                <button type="button" id="btnRestNormal" onclick="setNormalRest()" class="flex-1 py-5 px-2 rounded-xl text-xl sm:text-2xl font-bold border-4 border-gray-300 bg-white">通常(60分)</button>
                <button type="button" id="btnRestFlex" onclick="setFlexRest()" class="flex-1 py-5 px-2 rounded-xl text-xl sm:text-2xl font-bold border-4 border-gray-300 bg-white">選択</button>
              </div>
              <div id="flexRestOptions" class="hidden flex gap-3 mt-4">
                <button type="button" id="btnFlex20" onclick="selectFlexRest(20)" class="flex-1 py-3 border-4 border-gray-300 bg-white rounded-xl">20分</button>
                <button type="button" id="btnFlex30" onclick="selectFlexRest(30)" class="flex-1 py-3 border-4 border-gray-300 bg-white rounded-xl">30分</button>
                <button type="button" id="btnFlex40" onclick="selectFlexRest(40)" class="flex-1 py-3 border-4 border-gray-300 bg-white rounded-xl">40分</button>
              </div>
            </div>
            <div class="border-t-2 border-yellow-200 pt-6">
              <p class="text-xl font-bold text-yellow-800 mb-4">② 追加休憩</p>
              <button type="button" id="btnEveningRestToggle" onclick="toggleEveningRest()" class="w-full py-5 px-6 rounded-xl font-bold border-4 border-gray-300 bg-white">夕方食事休憩</button>
              <div id="eveningRestOptions" class="hidden flex gap-3 mt-4">
                <button type="button" id="btnEve20" onclick="selectEveningRest(20)" class="flex-1 py-3 border-4 border-gray-300 bg-white rounded-xl">20分</button>
                <button type="button" id="btnEve30" onclick="selectEveningRest(30)" class="flex-1 py-3 border-4 border-gray-300 bg-white rounded-xl">30分</button>
                <button type="button" id="btnEve40" onclick="selectEveningRest(40)" class="flex-1 py-3 border-4 border-gray-300 bg-white rounded-xl">40分</button>
              </div>
            </div>
          </div>
          
          <button type="submit" class="btn btn-primary text-2xl py-6 mb-4 shadow-lg">この内容で登録する</button>
          <button type="button" onclick="resetInputOnly()" class="w-full bg-gray-500 text-white font-bold text-2xl py-6 rounded-xl shadow-md">入力をリセット</button>
        </form>
      </div>
    </div>

    <!-- ★ リストタブ ★ -->
    <div id="tabList" class="hidden">
      <div id="statusArea" class="card border-4 border-gray-300 mb-8 text-center">
        <h2 class="text-xl font-bold text-gray-700 mb-1 mt-4">⏱️ 今月の勤務時間合計</h2>
        <div id="totalTime" class="text-huge text-gray-900 mb-8 bg-white rounded-2xl py-3 px-6 shadow-sm border-2 border-gray-200">0時間 0分</div>
        <div class="progress-bg relative mx-auto rounded-full overflow-hidden">
          <div class="flex w-full h-full">
            <div id="progressBarGreen" class="progress-bar" style="width: 0%; background-color: #22c55e;"></div>
            <div id="progressBarOrange" class="progress-bar" style="width: 0%; background-color: #f59e0b;"></div>
            <div id="progressBarRed" class="progress-bar" style="width: 0%; background-color: #ef4444;"></div>
          </div>
        </div>
        <div class="relative w-full h-6 mt-1 mb-8 text-xs text-gray-400 font-bold">
          <div class="absolute" style="left: 0%;">0</div>
          <div class="absolute" style="left: calc(75/87*100%);">75</div>
          <div class="absolute" style="left: 100%;">87</div>
        </div>
        <h2 class="text-xl font-bold text-gray-700 mb-1 mt-4">⏳ 87時間まで のこり</h2>
        <div id="remainingTime" class="text-huge text-gray-700 font-bold mb-2 bg-white rounded-2xl py-3 px-6 shadow-sm border-2 border-gray-200">--時間 --分</div>
      </div>
      <div id="recordList"></div>
    </div>
  </div>

  <!-- 完了モーダル -->
  <div id="successModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden transition-opacity duration-300">
    <div class="bg-white p-8 rounded-2xl w-11/12 max-w-sm shadow-2xl text-center border-4 border-blue-400">
      <div class="text-5xl mb-4">✨</div>
      <p id="successModalTitle" class="text-2xl font-bold mb-4 leading-relaxed"></p>
      <p id="successModalSub" class="text-xl font-bold text-gray-600"></p>
    </div>
  </div>

  <!-- 操作モーダル -->
  <div id="actionSelectModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white p-8 rounded-2xl w-11/12 max-w-sm shadow-2xl text-center border-4 border-gray-300">
      <h2 class="text-2xl font-bold mb-8">操作を選択</h2>
      <button onclick="executeActionEdit()" class="w-full bg-blue-600 text-white font-bold text-xl py-4 rounded-xl mb-4 shadow-md">修正する</button>
      <button onclick="executeActionDelete()" class="w-full bg-red-600 text-white font-bold text-xl py-4 rounded-xl mb-4 shadow-md">削除する</button>
      <button onclick="closeActionModal()" class="w-full bg-gray-500 text-white font-bold text-xl py-4 rounded-xl shadow-md">閉じる</button>
    </div>
  </div>

  <!-- 設定モーダル -->
  <div id="settingsModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white p-6 rounded-2xl w-11/12 max-w-sm border-4 border-gray-300 shadow-2xl">
      <h2 class="text-2xl font-bold mb-6 text-center border-b pb-2">⚙️ 設定</h2>
      <div class="mb-4">
        <label class="block font-bold mb-1">姓</label>
        <input type="text" id="settingLastName" class="input-field mb-0">
      </div>
      <div class="mb-6">
        <label class="block font-bold mb-1">名</label>
        <input type="text" id="settingFirstName" class="input-field mb-0">
      </div>
      <button onclick="saveSettings()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl mb-3 shadow-md">保存</button>
      <button onclick="closeSettings()" class="w-full bg-gray-500 text-white font-bold py-4 rounded-xl shadow-md">閉じる</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    let workRecords = [];
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth() + 1;
    let currentCommuteMode = null, currentRestMode = null, flexRestMinutes = 30, isEveningRestAdded = false, eveningRestMinutes = 30, isEditMode = false, targetActionDate = null;
    let isFirebaseActive = false, auth, db, user, appId;
    const MAX_MINUTES = 87 * 60;

    const getTodayStr = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    };
    const formatTime = (min) => `${Math.floor(Math.abs(min)/60)}時間 ${Math.abs(min)%60}分`;
    const formatTimeShort = (min) => min <= 0 ? '-' : `${Math.floor(min/60)}:${String(min%60).padStart(2,'0')}`;
    const formatTimeColon = (s) => s ? String(s).replace(':', '<span style="padding:0 3px;"> : </span>') : '-';

    // Firebase 初期化 (宣言の重複を避けるため一箇所で定義)
    const initializeFirebaseApp = async () => {
      if (typeof __firebase_config !== 'undefined') {
        try {
          const config = JSON.parse(__firebase_config);
          const app = initializeApp(config);
          auth = getAuth(app);
          db = getFirestore(app);
          appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
          isFirebaseActive = true;
          if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
          else await signInAnonymously(auth);
          onAuthStateChanged(auth, (u) => { user = u; if (user) fetchData(); });
        } catch (e) { isFirebaseActive = false; loadLocalData(); render(); }
      } else { isFirebaseActive = false; loadLocalData(); render(); }
    };

    const fetchData = () => {
      if (!isFirebaseActive || !user) return;
      onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'time_records'), (s) => {
        workRecords = s.docs.map(d => ({ id: d.id, ...d.data() }));
        localStorage.setItem('localWorkRecords', JSON.stringify(workRecords));
        render();
      }, (err) => console.error(err));
    };

    const loadLocalData = () => {
      const d = localStorage.getItem('localWorkRecords');
      if (d) workRecords = JSON.parse(d);
    };

    const render = () => {
      const prefix = `${currentYear}-${String(currentMonth).padStart(2,'0')}`;
      const monthly = workRecords.filter(r => r.date.startsWith(prefix));
      let totalWork = 0;
      monthly.forEach(r => totalWork += (r.workMinutes || 0));

      document.getElementById('displayMonth').textContent = `${currentYear}年 ${currentMonth}月`;
      document.getElementById('totalTime').textContent = formatTime(totalWork);
      document.getElementById('remainingTime').textContent = formatTime(MAX_MINUTES - totalWork);

      const pGreen = document.getElementById('progressBarGreen'), pOrange = document.getElementById('progressBarOrange'), pRed = document.getElementById('progressBarRed');
      const t1 = 75*60, t2 = 80*60;
      pGreen.style.width = `${(Math.min(totalWork, t1)/MAX_MINUTES)*100}%`;
      pOrange.style.width = `${(Math.max(0, Math.min(totalWork-t1, t2-t1))/MAX_MINUTES)*100}%`;
      pRed.style.width = `${(Math.max(0, totalWork-t2)/MAX_MINUTES)*100}%`;

      updateTopDisplay();
      updateInputVisibilityByToday();
      renderList(monthly);
    };

    const updateTopDisplay = () => {
      const dateVal = document.getElementById('date').value || getTodayStr();
      const d = new Date(dateVal);
      const week = ['日','月','火','水','木','金','土'][d.getDay()];
      document.getElementById('topDateDisplay').textContent = `${d.getFullYear()}年 ${d.getMonth()+1}月${d.getDate()}日（${week}）`;

      const record = workRecords.find(r => r.date === dateVal);
      const sh = document.getElementById('startHour').value, sm = document.getElementById('startMinute').value;
      const eh = document.getElementById('endHour').value, em = document.getElementById('endMinute').value;

      document.getElementById('topStartTime').textContent = sh ? `${sh}:${sm}` : (record ? record.startTime : '--:--');
      document.getElementById('topEndTime').textContent = eh ? `${eh}:${em}` : (record ? record.endTime : '--:--');
      document.getElementById('topWorkTime').textContent = record ? formatTime(record.workMinutes) : '--時間 --分';
      document.getElementById('topOverTime').textContent = record ? formatTime(record.overMinutes) : '--時間 --分';
      
      const boxes = ['displayStartBox', 'displayEndBox', 'displayRestBox'];
      boxes.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('filled', !!record);
      });

      let restTxt = '--分';
      if (record) {
        const b = record.baseRestMinutes || 0, e = record.eveningRestMinutes || 0;
        if(b > 0 && e > 0) restTxt = `昼${b}分 / 夕${e}分`;
        else if(b > 0) restTxt = `昼${b}分`;
        else if(e > 0) restTxt = `夕${e}分`;
        else restTxt = '0分';
      }
      document.getElementById('topRestTime').textContent = restTxt;
    };

    const renderList = (monthly) => {
      const container = document.getElementById('recordList');
      let rows = '';
      const sorted = [...monthly].sort((a,b) => a.date.localeCompare(b.date));
      sorted.forEach(record => {
        const day = new Date(record.date).getDate();
        rows += `
          <tr class="bg-white hover:bg-gray-50 transition-colors">
            <td class="p-2 border text-center font-bold">${day}日</td>
            <td class="p-2 border text-center font-bold">${formatTimeColon(record.startTime)}</td>
            <td class="p-2 border text-center font-bold">${formatTimeColon(record.endTime)}</td>
            <td class="p-2 border text-center font-bold text-blue-700">${formatTimeColon(formatTimeShort(record.workMinutes))}</td>
            <td class="p-2 border text-center font-bold text-[#d97706]">${record.overMinutes > 0 ? formatTimeColon(formatTimeShort(record.overMinutes)) : '-'}</td>
            <td class="p-2 border text-center"><button onclick="openActionModal('${record.date}')" class="bg-blue-500 text-white px-3 py-1.5 rounded-lg shadow hover:bg-blue-600 active:scale-95 transition-all">修正</button></td>
          </tr>`;
      });
      container.innerHTML = `
        <h3 class="text-xl font-bold my-4 pl-2 border-l-4 border-blue-800">タイムカード</h3>
        <div class="overflow-x-auto rounded-xl border border-gray-200 shadow-sm">
          <table class="w-full border-collapse">
            <thead><tr class="bg-gray-50 text-gray-600"><th>日</th><th>出勤</th><th>退勤</th><th>勤務</th><th>残業</th><th>操作</th></tr></thead>
            <tbody>${rows || '<tr><td colspan="6" class="p-8 text-center text-gray-400">記録がありません</td></tr>'}</tbody>
          </table>
        </div>`;
    };

    const updateInputVisibilityByToday = () => {
      const today = getTodayStr();
      document.getElementById('date').value = today;
      const exists = workRecords.some(r => r.date === today);
      const inputForm = document.getElementById('inputFormArea');
      const editGuide = document.getElementById('editGuideMessage');
      if (inputForm) inputForm.classList.toggle('hidden', exists && !isEditMode);
      if (editGuide) editGuide.classList.toggle('hidden', !exists || isEditMode);
    };

    window.switchTab = (name) => {
      const tabInput = document.getElementById('tabInput');
      const tabList = document.getElementById('tabList');
      const btnInput = document.getElementById('btnTabInput');
      const btnList = document.getElementById('btnTabList');
      if (tabInput) tabInput.classList.toggle('hidden', name !== 'input');
      if (tabList) tabList.classList.toggle('hidden', name !== 'list');
      if (btnInput) btnInput.className = name === 'input' ? "flex-1 py-5 text-xl sm:text-2xl font-bold bg-blue-600 text-white" : "flex-1 py-5 text-xl sm:text-2xl font-bold bg-white text-gray-500 hover:bg-gray-100";
      if (btnList) btnList.className = name === 'list' ? "flex-1 py-5 text-xl sm:text-2xl font-bold bg-blue-600 text-white" : "flex-1 py-5 text-xl sm:text-2xl font-bold bg-white text-gray-500 hover:bg-gray-100";
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.setNormalCommute = () => {
      currentCommuteMode = 'normal';
      document.getElementById('startHour').value = '08';
      document.getElementById('startMinute').value = '30';
      document.getElementById('startHour').disabled = true;
      document.getElementById('startMinute').disabled = true;
      document.getElementById('btnNormal').className = "flex-1 py-5 rounded-xl border-4 border-blue-500 bg-blue-100 font-bold btn-pressed";
      document.getElementById('btnFlex').className = "flex-1 py-5 rounded-xl border-4 border-gray-300 bg-white font-bold";
      updateTopDisplay();
    };

    window.setFlexCommute = () => {
      currentCommuteMode = 'flex';
      document.getElementById('startHour').disabled = false;
      document.getElementById('startMinute').disabled = false;
      document.getElementById('btnFlex').className = "flex-1 py-5 rounded-xl border-4 border-blue-500 bg-blue-100 font-bold btn-pressed";
      document.getElementById('btnNormal').className = "flex-1 py-5 rounded-xl border-4 border-gray-300 bg-white font-bold";
    };

    window.setCurrentEndTime = () => {
      const n = new Date();
      document.getElementById('endHour').value = String(n.getHours()).padStart(2,'0');
      document.getElementById('endMinute').value = String(n.getMinutes()).padStart(2,'0');
      updateTopDisplay();
    };

    window.setNoneRest = () => { currentRestMode='none'; updateTopDisplay(); };
    window.setNormalRest = () => { currentRestMode='normal'; updateTopDisplay(); };
    window.setFlexRest = () => { 
      currentRestMode='flex'; 
      const opts = document.getElementById('flexRestOptions');
      if (opts) opts.classList.remove('hidden'); 
      updateTopDisplay();
    };
    window.selectFlexRest = (m) => { flexRestMinutes=m; updateTopDisplay(); };
    window.toggleEveningRest = () => { isEveningRestAdded=!isEveningRestAdded; const opts = document.getElementById('eveningRestOptions'); if(opts) opts.classList.toggle('hidden'); updateTopDisplay(); };
    window.selectEveningRest = (m) => { eveningRestMinutes=m; updateTopDisplay(); };

    window.saveRecord = async (e) => {
      e.preventDefault();
      const date = document.getElementById('date').value;
      const sh = document.getElementById('startHour').value, sm = document.getElementById('startMinute').value;
      const eh = document.getElementById('endHour').value, em = document.getElementById('endMinute').value;
      if(!sh || !sm || !eh || !em) return;

      const base = currentRestMode==='normal' ? 60 : (currentRestMode==='flex' ? flexRestMinutes : 0);
      const eve = isEveningRestAdded ? eveningRestMinutes : 0;
      
      const st = parseInt(sh)*60 + parseInt(sm), et = parseInt(eh)*60 + parseInt(em);
      const limit = 17*60+30;
      let w = 0, o = 0;
      if (et <= limit) w = Math.max(0, et-st-base);
      else if (st >= limit) o = Math.max(0, et-st-eve);
      else { w = Math.max(0, limit-st-base); o = Math.max(0, et-limit-eve); }

      const data = { date, startTime: `${sh}:${sm}`, endTime: `${eh}:${em}`, workMinutes: w, overMinutes: o, baseRestMinutes: base, eveningRestMinutes: eve, createdAt: Date.now() };
      if(isFirebaseActive && user) await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'time_records', date), data);
      workRecords = workRecords.filter(r => r.date !== date);
      workRecords.push(data);
      localStorage.setItem('localWorkRecords', JSON.stringify(workRecords));
      
      const isEdit = isEditMode;
      isEditMode = false;
      render();
      
      const titleEl = document.getElementById('successModalTitle');
      const subEl = document.getElementById('successModalSub');
      if (isEdit) {
        const d = new Date(date);
        titleEl.innerHTML = `${d.getMonth()+1}月${d.getDate()}日の勤務内容を<br>修正しました📝`;
        subEl.textContent = 'おつかれさまでした😊';
      } else {
        titleEl.innerHTML = '本日の勤務情報を<br>記録しました📝';
        subEl.textContent = 'お仕事おつかれさまでした😌';
      }

      const modal = document.getElementById('successModal');
      if (modal) modal.classList.remove('hidden');
      setTimeout(() => { if(modal) modal.classList.add('hidden'); }, 2500);
    };

    window.changeMonth = (d) => { currentMonth+=d; if(currentMonth>12){currentMonth=1;currentYear++;} else if(currentMonth<1){currentMonth=12;currentYear--;} render(); };
    window.openActionModal = (d) => { targetActionDate=d; const modal = document.getElementById('actionSelectModal'); if(modal) modal.classList.remove('hidden'); };
    window.closeActionModal = () => { const modal = document.getElementById('actionSelectModal'); if(modal) modal.classList.add('hidden'); };
    window.executeActionEdit = () => { isEditMode = true; closeActionModal(); updateInputVisibilityByToday(); };
    window.executeActionDelete = async () => {
      if(isFirebaseActive && user) await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'time_records', targetActionDate));
      workRecords = workRecords.filter(r => r.date !== targetActionDate);
      localStorage.setItem('localWorkRecords', JSON.stringify(workRecords));
      closeActionModal(); render();
    };

    window.openSettings = () => { const modal = document.getElementById('settingsModal'); if(modal) modal.classList.remove('hidden'); };
    window.closeSettings = () => { const modal = document.getElementById('settingsModal'); if(modal) modal.classList.add('hidden'); };
    window.saveSettings = () => {
      const ln = document.getElementById('settingLastName').value;
      const fn = document.getElementById('settingFirstName').value;
      localStorage.setItem('lastName', ln);
      localStorage.setItem('firstName', fn);
      closeSettings(); loadUserName();
    };

    const loadUserName = () => {
      const ln = localStorage.getItem('lastName')||'', fn = localStorage.getItem('firstName')||'';
      const el = document.getElementById('headerUserName');
      if(el && (ln||fn)) { el.textContent = `🙍🏻‍♂️ ${ln} ${fn}`; el.style.display='block'; }
    };

    window.editTodayRecord = () => { isEditMode = true; updateInputVisibilityByToday(); };
    window.resetInputOnly = () => {
      document.getElementById('startHour').value = '';
      document.getElementById('startMinute').value = '';
      document.getElementById('endHour').value = '';
      document.getElementById('endMinute').value = '';
      isEditMode = false;
      updateInputVisibilityByToday();
    };

    document.addEventListener('DOMContentLoaded', () => {
      setInterval(() => {
        const n = new Date();
        const w = ['日','月','火','水','木','金','土'][n.getDay()];
        const clockDate = document.getElementById('realtimeDate');
        const clockTime = document.getElementById('realtimeClock');
        if(clockDate) clockDate.textContent = `📆 ${n.getFullYear()}年 ${n.getMonth()+1}月${n.getDate()}日（${w}）`;
        if(clockTime) clockTime.textContent = `🕰️ ${String(n.getHours()).padStart(2,'0')} : ${String(n.getMinutes()).padStart(2,'0')} : ${String(n.getSeconds()).padStart(2,'0')}`;
      }, 1000);
      loadUserName();
      initializeFirebaseApp();
    });
  </script>
</body>
</html>
